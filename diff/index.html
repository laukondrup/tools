<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diff</title>
    <meta name="theme-color" content="#111217" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #111217;
        --bg-soft: #171922;
        --surface: #1d202a;
        --surface-deep: #151821;
        --line: #303544;
        --line-strong: #41495c;
        --text: #eff2f9;
        --muted: #9ea8be;
        --accent: #5ac8fa;
        --accent-2: #f9c85a;
        --add-bg: #1d3c31;
        --remove-bg: #4a2a2f;
        --radius: 15px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace;
        background:
          radial-gradient(circle at 12% 4%, rgba(90, 200, 250, 0.14) 0%, transparent 34%),
          radial-gradient(circle at 86% 94%, rgba(249, 200, 90, 0.1) 0%, transparent 31%), var(--bg);
      }

      .shell {
        width: min(1320px, calc(100vw - 1rem));
        margin: 0.5rem auto 1rem;
        border: 1px solid var(--line-strong);
        border-radius: calc(var(--radius) + 2px);
        background: linear-gradient(168deg, #1d202a 0%, #171a23 58%, #1b1f2a 100%);
        box-shadow: 0 26px 55px rgba(0, 0, 0, 0.44);
        overflow: hidden;
      }

      .hero {
        padding: 1.1rem 1.15rem 0.95rem;
        border-bottom: 1px solid var(--line);
        position: relative;
      }

      .hero::after {
        content: '';
        position: absolute;
        right: 1rem;
        top: 1rem;
        width: 110px;
        height: 110px;
        background:
          linear-gradient(135deg, rgba(90, 200, 250, 0.2), transparent 70%),
          linear-gradient(45deg, rgba(249, 200, 90, 0.22), transparent 60%);
        border: 1px solid rgba(255, 255, 255, 0.11);
        border-radius: 20px;
        transform: rotate(12deg);
        pointer-events: none;
      }

      h1 {
        margin: 0;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: clamp(1.35rem, 2.8vw, 2.2rem);
        line-height: 0.95;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        position: relative;
        z-index: 1;
      }

      .title-row {
        display: inline-flex;
        gap: 0.42rem;
        align-items: center;
        position: relative;
        z-index: 1;
      }

      .title-editable {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
      }

      .title-editable h1 {
        display: inline;
      }

      .editable-content {
        outline: none;
        border-radius: 8px;
        padding: 0.05rem 0.2rem 0.08rem;
      }

      .editable-content.is-editing {
        box-shadow: 0 0 0 1px var(--accent);
        background: rgba(90, 200, 250, 0.06);
      }

      .editable-content.is-title {
        min-width: 7ch;
      }

      .description-block {
        padding: 0.6rem 1.15rem 0.8rem;
        border-bottom: 1px solid var(--line);
        background: rgba(14, 18, 26, 0.38);
      }

      .description-input {
        margin: 0;
        width: 100%;
        min-height: 2.3rem;
        border: 1px solid rgba(65, 73, 92, 0.5);
        background: rgba(16, 21, 30, 0.46);
        color: var(--muted);
        border-radius: 10px;
        padding: 0.45rem 0.55rem;
        resize: vertical;
        outline: none;
        font:
          400 0.76rem/1.4 'JetBrains Mono',
          monospace;
        position: relative;
        z-index: 1;
      }

      .description-input::placeholder {
        color: #7f8aa3;
      }

      .description-input:focus-visible {
        border-color: rgba(90, 200, 250, 0.56);
      }

      .toolbar {
        padding: 0.75rem 1.15rem;
        border-bottom: 1px solid var(--line);
        display: flex;
        flex-wrap: wrap;
        align-items: end;
        gap: 0.55rem;
        background: rgba(17, 18, 23, 0.35);
      }

      .control {
        display: grid;
        gap: 0.2rem;
      }

      .control > label {
        font-size: 0.62rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .control-toggle {
        display: inline-flex;
        gap: 0.24rem;
        padding: 0.2rem;
        border: 1px solid var(--line-strong);
        border-radius: 10px;
        background: #161b25;
      }

      .control-toggle input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .control-toggle label {
        margin: 0;
        display: inline-flex;
      }

      .control-option {
        border: 1px solid transparent;
        color: var(--muted);
        border-radius: 8px;
        padding: 0.34rem 0.52rem;
        font:
          500 0.75rem/1 'JetBrains Mono',
          monospace;
        cursor: pointer;
        user-select: none;
        transition:
          border-color 120ms ease,
          color 120ms ease,
          background 120ms ease;
      }

      .control-option:hover {
        color: var(--text);
      }

      .control-toggle input:checked + .control-option {
        border-color: var(--accent);
        color: var(--text);
        background: rgba(90, 200, 250, 0.12);
      }

      select,
      button,
      input[type='file'] {
        border: 1px solid var(--line-strong);
        background: #161b25;
        color: var(--text);
        font:
          500 0.79rem/1 'JetBrains Mono',
          monospace;
        border-radius: 10px;
        padding: 0.44rem 0.54rem;
      }

      button {
        cursor: pointer;
      }

      button:hover,
      select:hover {
        border-color: var(--accent);
      }

      .danger:hover {
        border-color: #ff8686;
      }

      .inputs {
        padding: 0.8rem 1.15rem 0.95rem;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.72rem;
        border-bottom: 1px solid var(--line);
      }

      .pane {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: linear-gradient(180deg, #1c202a 0%, #191c25 100%);
        overflow: hidden;
      }

      .pane.drop-target {
        border-color: var(--accent-2);
        box-shadow: inset 0 0 0 1px rgba(249, 200, 90, 0.55);
      }

      .pane-head {
        padding: 0.62rem 0.72rem;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 0.4rem;
      }

      .pane-title {
        margin: 0;
        font-size: 0.75rem;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .file-meta {
        font-size: 0.71rem;
        color: var(--muted);
      }

      .pane-toolbar {
        padding: 0.55rem 0.72rem;
        border-bottom: 1px solid var(--line);
        display: flex;
        gap: 0.45rem;
        flex-wrap: wrap;
        align-items: center;
      }

      .pane-toolbar label {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.74rem;
        color: var(--muted);
      }

      .pane-title-wrap {
        display: inline-flex;
        align-items: center;
        gap: 0.28rem;
      }

      .icon-edit {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1.3rem;
        height: 1.3rem;
        padding: 0;
        border-radius: 8px;
        border: 1px solid rgba(65, 73, 92, 0.66);
        background: rgba(20, 24, 32, 0.72);
        color: #a9b4cb;
      }

      .icon-edit:hover {
        color: var(--text);
        border-color: var(--accent);
      }

      .icon-edit svg {
        width: 0.82rem;
        height: 0.82rem;
      }

      .editor-wrap {
        position: relative;
        min-height: 215px;
        max-height: 420px;
        overflow: auto;
        background: #11151d;
      }

      .highlight-layer,
      .editor-input {
        margin: 0;
        border: 0;
        padding: 0.8rem;
        min-height: 100%;
        font:
          400 0.84rem/1.56 'JetBrains Mono',
          monospace;
        white-space: pre;
      }

      .highlight-layer {
        pointer-events: none;
        color: #d2dae7;
      }

      .editor-input {
        position: absolute;
        inset: 0;
        width: 100%;
        resize: none;
        overflow: hidden;
        background: transparent;
        color: transparent;
        caret-color: #f7fafc;
        outline: none;
      }

      .editor-input::selection {
        background: rgba(90, 200, 250, 0.32);
      }

      .placeholder {
        color: #74809a;
      }

      .status {
        min-height: 2.2rem;
        padding: 0.5rem 1.15rem;
        border-bottom: 1px solid var(--line);
        font-size: 0.78rem;
        color: var(--muted);
      }

      .status.error {
        color: #ff9f9f;
      }

      .diff-zone {
        padding: 0.88rem 1.15rem 1rem;
      }

      .diff-surface {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface-deep);
        min-height: 230px;
        overflow: hidden;
      }

      .diff-context {
        padding: 0.45rem 0.62rem;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.5rem;
        background: rgba(17, 23, 34, 0.7);
        flex-wrap: wrap;
      }

      .diff-context-left {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        flex-wrap: wrap;
      }

      .diff-context-controls {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        flex-wrap: wrap;
      }

      .diff-context-title {
        font-size: 0.66rem;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .diff-context-stats {
        font-size: 0.74rem;
        border: 1px solid var(--line);
        background: #161922;
        border-radius: 999px;
        padding: 0.23rem 0.57rem;
        color: var(--muted);
      }

      .diff-empty {
        margin: 0;
        padding: 1rem;
        color: var(--muted);
        font-size: 0.78rem;
      }

      .unified {
        margin: 0;
        padding: 0;
        font:
          400 0.82rem/1.55 'JetBrains Mono',
          monospace;
      }

      .diff-lines {
        width: 100%;
      }

      .diff-line {
        display: grid;
        grid-template-columns: 3.6rem 1fr;
        border-bottom: 1px solid #242a36;
      }

      .diff-line:last-child {
        border-bottom: 0;
      }

      .diff-line-no {
        padding: 0.48rem 0.5rem 0.48rem 0.66rem;
        color: #7d889f;
        border-right: 1px solid #242a36;
        text-align: right;
        user-select: none;
      }

      .diff-line-body {
        padding: 0.48rem 0.66rem;
        white-space: pre-wrap;
        word-break: break-word;
        min-height: 1.5rem;
      }

      .split {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .diff-pane {
        border-right: 1px solid var(--line);
      }

      .diff-pane:last-child {
        border-right: 0;
      }

      .diff-head {
        padding: 0.48rem 0.6rem;
        border-bottom: 1px solid var(--line);
        color: var(--muted);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }

      .diff-head-label {
        font-size: 0.66rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .diff-content {
        margin: 0;
        padding: 0;
        font:
          400 0.82rem/1.55 'JetBrains Mono',
          monospace;
        min-height: 165px;
      }

      .segment.add {
        background: var(--add-bg);
        color: #d9ffec;
      }

      .segment.remove {
        background: var(--remove-bg);
        color: #ffd8dd;
      }

      .legend {
        margin-top: 0.52rem;
        display: flex;
        gap: 0.62rem;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 0.72rem;
      }

      .swatch {
        width: 0.88rem;
        height: 0.88rem;
        display: inline-block;
        border: 1px solid var(--line-strong);
        vertical-align: text-bottom;
      }

      .swatch.add {
        background: var(--add-bg);
      }

      .swatch.remove {
        background: var(--remove-bg);
      }

      .token.comment,
      .token.prolog,
      .token.cdata {
        color: #7d8ca7;
      }

      .token.punctuation {
        color: #b7c3d9;
      }

      .token.namespace {
        opacity: 0.7;
      }

      .token.property,
      .token.tag,
      .token.constant,
      .token.symbol,
      .token.deleted {
        color: #f78ca8;
      }

      .token.boolean,
      .token.number {
        color: #f6d06c;
      }

      .token.selector,
      .token.attr-name,
      .token.string,
      .token.char,
      .token.builtin,
      .token.inserted {
        color: #77dfb1;
      }

      .token.operator,
      .token.entity,
      .token.url,
      .language-css .token.string,
      .style .token.string {
        color: #5ac8fa;
      }

      .token.atrule,
      .token.attr-value,
      .token.keyword {
        color: #c89df6;
      }

      .token.function,
      .token.class-name {
        color: #f8b56f;
      }

      .token.regex,
      .token.important,
      .token.variable {
        color: #ff9f80;
      }

      .token.important,
      .token.bold {
        font-weight: bold;
      }

      .token.italic {
        font-style: italic;
      }

      @media (max-width: 1024px) {
        .inputs {
          grid-template-columns: 1fr;
        }

        .split {
          grid-template-columns: 1fr;
        }

        .diff-pane {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .diff-pane:last-child {
          border-bottom: 0;
        }
      }

      @media (max-width: 760px) {
        .shell {
          width: calc(100vw - 0.5rem);
          margin: 0.25rem auto 0.7rem;
        }

        .hero,
        .toolbar,
        .inputs,
        .status,
        .diff-zone {
          padding-left: 0.62rem;
          padding-right: 0.62rem;
        }

        .hero::after {
          display: none;
        }

        .description-input {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.30.0/components/prism-core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.30.0/components/prism-clike.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.30.0/components/prism-markup.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.30.0/components/prism-css.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.30.0/components/prism-javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.30.0/components/prism-typescript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.30.0/components/prism-jsx.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.30.0/components/prism-tsx.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.30.0/components/prism-json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.30.0/components/prism-markdown.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.30.0/components/prism-bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.30.0/components/prism-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.30.0/components/prism-python.min.js"></script>

    <script type="module">
      import { h, render } from 'https://esm.sh/preact@10.26.6';
      import { useEffect, useMemo, useRef, useState } from 'https://esm.sh/preact@10.26.6/hooks';
      import * as Diff from 'https://esm.sh/diff@7.0.0';

      const LANGUAGE_OPTIONS = [
        { value: 'auto', label: 'Auto detect' },
        { value: 'javascript', label: 'JavaScript' },
        { value: 'typescript', label: 'TypeScript' },
        { value: 'jsx', label: 'JSX' },
        { value: 'tsx', label: 'TSX' },
        { value: 'json', label: 'JSON' },
        { value: 'markup', label: 'HTML/XML' },
        { value: 'css', label: 'CSS' },
        { value: 'markdown', label: 'Markdown' },
        { value: 'bash', label: 'Bash' },
        { value: 'yaml', label: 'YAML' },
        { value: 'python', label: 'Python' },
        { value: 'clike', label: 'C-like' },
      ];

      const EXTENSION_LANGUAGE = {
        js: 'javascript',
        mjs: 'javascript',
        cjs: 'javascript',
        ts: 'typescript',
        jsx: 'jsx',
        tsx: 'tsx',
        json: 'json',
        html: 'markup',
        htm: 'markup',
        xml: 'markup',
        svg: 'markup',
        css: 'css',
        md: 'markdown',
        markdown: 'markdown',
        sh: 'bash',
        bash: 'bash',
        zsh: 'bash',
        yml: 'yaml',
        yaml: 'yaml',
        py: 'python',
        c: 'clike',
        cpp: 'clike',
        h: 'clike',
        java: 'clike',
      };

      const DECODER = new TextDecoder('utf-8', { fatal: false });
      const ENCODER = new TextEncoder();

      function bytesLabel(bytes) {
        if (!Number.isFinite(bytes) || bytes < 0) return 'unknown size';
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
        return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
      }

      function toBase64Url(text) {
        const bytes = ENCODER.encode(text);
        let binary = '';
        for (let i = 0; i < bytes.length; i += 1) {
          binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary).replaceAll('+', '-').replaceAll('/', '_').replace(/=+$/g, '');
      }

      function fromBase64Url(encoded) {
        if (!encoded) return '';
        const padded = encoded.replaceAll('-', '+').replaceAll('_', '/');
        const withPadding = `${padded}${'='.repeat((4 - (padded.length % 4)) % 4)}`;
        const binary = atob(withPadding);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) {
          bytes[i] = binary.charCodeAt(i);
        }
        return DECODER.decode(bytes);
      }

      function getInitialStateFromUrl() {
        const query = new URLSearchParams(window.location.search);
        const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
        let diffPayload = { originalText: '', comparisonText: '' };

        try {
          const rawDiff = hashParams.get('diff');
          if (rawDiff) {
            diffPayload = JSON.parse(fromBase64Url(rawDiff));
          }
        } catch {
          diffPayload = { originalText: '', comparisonText: '' };
        }

        return {
          title: query.get('title') || '',
          description: query.get('description') || '',
          originalLabel: query.get('original') || '',
          comparisonLabel: query.get('comparison') || '',
          viewMode: query.get('view') === 'unified' ? 'unified' : 'split',
          diffMode: ['word', 'char', 'line'].includes(query.get('mode'))
            ? query.get('mode')
            : 'word',
          ignoreWhitespace: query.get('ws') === '1',
          originalLanguageSelection: query.get('olang') || 'auto',
          comparisonLanguageSelection: query.get('clang') || 'auto',
          originalText:
            typeof diffPayload.originalText === 'string' ? diffPayload.originalText : '',
          comparisonText:
            typeof diffPayload.comparisonText === 'string' ? diffPayload.comparisonText : '',
        };
      }

      function escapeHtml(value) {
        return value
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function extensionFromFilename(filename) {
        if (!filename || !filename.includes('.')) return '';
        return filename.split('.').pop().toLowerCase();
      }

      function detectLanguage(filename, text) {
        const ext = extensionFromFilename(filename);
        if (ext && EXTENSION_LANGUAGE[ext]) return EXTENSION_LANGUAGE[ext];

        const sample = text.slice(0, 6000);
        const trimmed = sample.trimStart();

        if (!trimmed) return 'javascript';
        if (trimmed.startsWith('{') || trimmed.startsWith('[')) return 'json';
        if (trimmed.startsWith('# ') || trimmed.includes('\n## ')) return 'markdown';
        if (
          trimmed.startsWith('<!doctype') ||
          trimmed.startsWith('<html') ||
          trimmed.startsWith('<')
        ) {
          return 'markup';
        }
        if (trimmed.startsWith('---') || trimmed.includes(':\n  ')) return 'yaml';
        if (
          trimmed.startsWith('#!/bin/') ||
          trimmed.includes('\nfi\n') ||
          trimmed.includes(' && ')
        ) {
          return 'bash';
        }
        if (trimmed.includes('def ') || trimmed.includes('import ') || trimmed.includes('class ')) {
          return 'python';
        }
        if (
          trimmed.includes('interface ') ||
          trimmed.includes('type ') ||
          trimmed.includes(': string')
        ) {
          return 'typescript';
        }
        if (trimmed.includes('function ') || trimmed.includes('const ') || trimmed.includes('=>')) {
          return 'javascript';
        }

        return 'javascript';
      }

      function chooseLanguage(selection, filename, text) {
        if (selection && selection !== 'auto') return selection;
        return detectLanguage(filename, text);
      }

      function highlightCode(text, language) {
        const prism = window.Prism;
        if (!prism) return escapeHtml(text);
        const grammar = prism.languages[language] || prism.languages.javascript;
        try {
          return prism.highlight(text, grammar, language);
        } catch {
          return escapeHtml(text);
        }
      }

      function highlightInputText(text, language) {
        if (!text) {
          return '<span class="placeholder">Start typing, paste, or drop a file...</span>';
        }
        // Keep one extra newline so the overlay height stays aligned at EOF.
        return highlightCode(`${text}\n`, language);
      }

      async function readFileAsText(file) {
        const buffer = await file.arrayBuffer();
        const bytes = new Uint8Array(buffer);

        let nullCount = 0;
        for (let i = 0; i < bytes.length; i += 1) {
          if (bytes[i] === 0) {
            nullCount += 1;
            if (nullCount > 2) {
              throw new Error('Looks like a binary file (NUL bytes detected).');
            }
          }
        }

        return DECODER.decode(bytes);
      }

      function buildParts(a, b, mode, ignoreWhitespace) {
        if (mode === 'char') return Diff.diffChars(a, b);
        if (mode === 'line') {
          return Diff.diffLines(a, b, { newlineIsToken: true, ignoreWhitespace });
        }
        if (ignoreWhitespace) {
          return Diff.diffWords(a, b, { ignoreWhitespace: true });
        }
        return Diff.diffWordsWithSpace(a, b);
      }

      function partCount(part, mode) {
        if (typeof part.count === 'number') return part.count;
        if (mode === 'line') {
          if (!part.value) return 0;
          const lines = part.value.split('\n').length;
          return part.value.endsWith('\n') ? lines - 1 : lines;
        }
        return part.value.length;
      }

      function renderDiffHtml(text) {
        return escapeHtml(text).replaceAll('\n', '<br />');
      }

      function buildLineRows(parts, side = 'unified') {
        const rows = [[]];

        for (const part of parts) {
          if (side === 'left' && part.added) continue;
          if (side === 'right' && part.removed) continue;

          const type = part.added ? 'add' : part.removed ? 'remove' : 'same';
          const chunks = String(part.value).split('\n');

          for (let i = 0; i < chunks.length; i += 1) {
            const chunk = chunks[i];
            if (chunk.length > 0) {
              rows[rows.length - 1].push({ type, text: chunk });
            }
            if (i < chunks.length - 1) {
              rows.push([]);
            }
          }
        }

        if (rows.length > 1 && rows[rows.length - 1].length === 0) {
          rows.pop();
        }

        return rows;
      }

      function LineRows({ rows, rowPrefix }) {
        return h(
          'div',
          { class: 'diff-lines' },
          rows.map((segments, idx) =>
            h('div', { class: 'diff-line', key: `${rowPrefix}-${idx}` }, [
              h('span', { class: 'diff-line-no' }, String(idx + 1)),
              h(
                'span',
                { class: 'diff-line-body' },
                segments.length > 0
                  ? segments.map((segment, segIdx) =>
                      h(
                        'span',
                        { class: `segment ${segment.type}`, key: `${rowPrefix}-${idx}-${segIdx}` },
                        segment.text,
                      ),
                    )
                  : h('span', { class: 'segment same' }, '\u00a0'),
              ),
            ]),
          ),
        );
      }

      function UnifiedDiff({ parts }) {
        if (!parts.length) {
          return h(
            'p',
            { class: 'diff-empty' },
            'Paste text or drop files into both panes to generate a diff.',
          );
        }

        const rows = buildLineRows(parts, 'unified');
        return h('div', { class: 'unified' }, h(LineRows, { rows, rowPrefix: 'u' }));
      }

      function SplitDiff({
        parts,
        originalLabel,
        comparisonLabel,
        onSaveOriginal,
        onSaveComparison,
      }) {
        if (!parts.length) {
          return h(
            'p',
            { class: 'diff-empty' },
            'Paste text or drop files into both panes to generate a diff.',
          );
        }

        return h('div', { class: 'split' }, [
          h('div', { class: 'diff-pane', key: 'left' }, [
            h('div', { class: 'diff-head' }, [
              h(EditableText, {
                value: originalLabel,
                onSave: onSaveOriginal,
                fallbackValue: 'Original',
                className: 'diff-head-label',
                editButtonTitle: `Edit ${originalLabel}`,
              }),
            ]),
            h(
              'pre',
              { class: 'diff-content' },
              h(LineRows, { rows: buildLineRows(parts, 'left'), rowPrefix: 'l' }),
            ),
          ]),
          h('div', { class: 'diff-pane', key: 'right' }, [
            h('div', { class: 'diff-head' }, [
              h(EditableText, {
                value: comparisonLabel,
                onSave: onSaveComparison,
                fallbackValue: 'Comparison',
                className: 'diff-head-label',
                editButtonTitle: `Edit ${comparisonLabel}`,
              }),
            ]),
            h(
              'pre',
              { class: 'diff-content' },
              h(LineRows, { rows: buildLineRows(parts, 'right'), rowPrefix: 'r' }),
            ),
          ]),
        ]);
      }

      function CopyIcon() {
        return h(
          'svg',
          {
            viewBox: '0 0 24 24',
            fill: 'none',
            stroke: 'currentColor',
            'stroke-width': '1.8',
            'stroke-linecap': 'round',
            'stroke-linejoin': 'round',
            'aria-hidden': 'true',
          },
          [
            h('rect', { x: '9', y: '9', width: '11', height: '11', rx: '2' }),
            h('path', { d: 'M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1' }),
          ],
        );
      }

      function PencilIcon() {
        return h(
          'svg',
          {
            viewBox: '0 0 24 24',
            fill: 'none',
            stroke: 'currentColor',
            'stroke-width': '1.8',
            'stroke-linecap': 'round',
            'stroke-linejoin': 'round',
            'aria-hidden': 'true',
          },
          [
            h('path', {
              d: 'M16.862 4.487l1.688-1.688a1.875 1.875 0 112.651 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z',
            }),
            h('path', { d: 'M19.5 7.125L16.875 4.5' }),
          ],
        );
      }

      function EditableText({
        value,
        onSave,
        fallbackValue,
        className,
        editButtonTitle,
        element = 'span',
      }) {
        const [isEditing, setIsEditing] = useState(false);
        const contentRef = useRef(null);

        useEffect(() => {
          if (isEditing || !contentRef.current) return;
          contentRef.current.textContent = value || fallbackValue;
        }, [value, fallbackValue, isEditing]);

        useEffect(() => {
          if (!isEditing || !contentRef.current) return;
          contentRef.current.textContent = value || fallbackValue;
          contentRef.current.focus();
          const range = document.createRange();
          range.selectNodeContents(contentRef.current);
          range.collapse(false);
          const selection = window.getSelection();
          selection?.removeAllRanges();
          selection?.addRange(range);
        }, [isEditing, value, fallbackValue]);

        const Tag = element;

        function finishEditing() {
          const nextRaw = contentRef.current?.textContent || '';
          const nextValue = nextRaw.trim();
          setIsEditing(false);
          onSave(nextValue);
        }

        return h('span', { class: className }, [
          h(
            Tag,
            {
              ref: contentRef,
              class: `editable-content${isEditing ? ' is-editing' : ''}${element === 'h1' ? ' is-title' : ''}`,
              contentEditable: isEditing,
              spellCheck: false,
              suppressContentEditableWarning: true,
              onBlur: finishEditing,
              onKeyDown: (event) => {
                if (event.key === 'Enter') {
                  event.preventDefault();
                  event.currentTarget.blur();
                }
              },
            },
            value || fallbackValue,
          ),
          h(
            'button',
            {
              type: 'button',
              class: 'icon-edit',
              onClick: () => setIsEditing(true),
              title: editButtonTitle,
              'aria-label': editButtonTitle,
            },
            h(PencilIcon),
          ),
        ]);
      }

      function InputPane({
        title,
        text,
        setText,
        fileMeta,
        setFileMeta,
        languageSelection,
        setLanguageSelection,
        effectiveLanguage,
        onLoadFile,
        isDropTarget,
        setDropTarget,
        onSaveTitle,
      }) {
        const fileInputRef = useRef(null);
        const scrollRef = useRef(null);
        const textareaRef = useRef(null);
        const highlightRef = useRef(null);

        async function onFile(file) {
          if (!file) return;
          await onLoadFile(file, setText, setFileMeta);
        }

        function onInputFile(event) {
          const [file] = event.target.files || [];
          void onFile(file);
          event.target.value = '';
        }

        function onDragOver(event) {
          event.preventDefault();
          event.dataTransfer.dropEffect = 'copy';
          setDropTarget(true);
        }

        function onDragLeave(event) {
          event.preventDefault();
          setDropTarget(false);
        }

        function onDrop(event) {
          event.preventDefault();
          setDropTarget(false);
          const [file] = event.dataTransfer.files || [];
          if (file) void onFile(file);
        }

        function onScroll() {
          if (!textareaRef.current || !highlightRef.current) return;
          highlightRef.current.scrollTop = textareaRef.current.scrollTop;
          highlightRef.current.scrollLeft = textareaRef.current.scrollLeft;
        }

        function onTextareaPaste(event) {
          const item = Array.from(event.clipboardData?.items || []).find(
            (entry) => entry.kind === 'file',
          );
          if (!item) return;
          const file = item.getAsFile();
          if (!file) return;
          event.preventDefault();
          void onFile(file);
        }

        return h(
          'section',
          {
            class: `pane${isDropTarget ? ' drop-target' : ''}`,
            onDragOver,
            onDragLeave,
            onDrop,
          },
          [
            h('div', { class: 'pane-head', key: 'head' }, [
              h(EditableText, {
                value: title,
                onSave: onSaveTitle,
                fallbackValue: 'Untitled',
                className: 'pane-title-wrap',
                editButtonTitle: `Edit ${title}`,
                element: 'p',
              }),
              fileMeta
                ? h(
                    'span',
                    { class: 'file-meta' },
                    `${fileMeta.name} (${bytesLabel(fileMeta.size)}) · ${fileMeta.source}`,
                  )
                : h(
                    'span',
                    { class: 'file-meta' },
                    `Drag and drop a file into ${title.toLowerCase()}`,
                  ),
            ]),
            h('div', { class: 'pane-toolbar', key: 'toolbar' }, [
              h(
                'button',
                {
                  type: 'button',
                  onClick: () => fileInputRef.current?.click(),
                },
                'Import file',
              ),
              h('input', {
                type: 'file',
                ref: fileInputRef,
                style: 'display:none',
                onChange: onInputFile,
              }),
              h('label', null, [
                h('span', null, 'Language'),
                h(
                  'select',
                  {
                    value: languageSelection,
                    onChange: (event) => setLanguageSelection(event.currentTarget.value),
                  },
                  LANGUAGE_OPTIONS.map((option) =>
                    h('option', { key: option.value, value: option.value }, option.label),
                  ),
                ),
              ]),
              h('span', { class: 'file-meta' }, `Using: ${effectiveLanguage}`),
            ]),
            h('div', { class: 'editor-wrap', ref: scrollRef }, [
              h('pre', {
                ref: highlightRef,
                class: 'highlight-layer',
                'aria-hidden': 'true',
                dangerouslySetInnerHTML: { __html: highlightInputText(text, effectiveLanguage) },
              }),
              h('textarea', {
                ref: textareaRef,
                class: 'editor-input',
                value: text,
                spellCheck: false,
                onInput: (event) => setText(event.currentTarget.value),
                onPaste: onTextareaPaste,
                onScroll,
                placeholder: ' ',
              }),
            ]),
          ],
        );
      }

      function App() {
        const initialState = useMemo(() => getInitialStateFromUrl(), []);
        const [title, setTitle] = useState(initialState.title);
        const [description, setDescription] = useState(initialState.description);
        const [originalLabel, setOriginalLabel] = useState(initialState.originalLabel);
        const [comparisonLabel, setComparisonLabel] = useState(initialState.comparisonLabel);
        const [topText, setTopText] = useState(initialState.originalText);
        const [bottomText, setBottomText] = useState(initialState.comparisonText);
        const [topFileMeta, setTopFileMeta] = useState(null);
        const [bottomFileMeta, setBottomFileMeta] = useState(null);
        const [viewMode, setViewMode] = useState(initialState.viewMode);
        const [diffMode, setDiffMode] = useState(initialState.diffMode);
        const [ignoreWhitespace, setIgnoreWhitespace] = useState(initialState.ignoreWhitespace);
        const [topLanguageSelection, setTopLanguageSelection] = useState(
          initialState.originalLanguageSelection,
        );
        const [bottomLanguageSelection, setBottomLanguageSelection] = useState(
          initialState.comparisonLanguageSelection,
        );
        const [statusMessage, setStatusMessage] = useState(
          'Ready. Paste or drop files directly in each input pane.',
        );
        const [statusError, setStatusError] = useState(false);
        const [topDropTarget, setTopDropTarget] = useState(false);
        const [bottomDropTarget, setBottomDropTarget] = useState(false);
        const [copyState, setCopyState] = useState('idle');

        const topLanguage = useMemo(
          () => chooseLanguage(topLanguageSelection, topFileMeta?.name, topText),
          [topLanguageSelection, topFileMeta, topText],
        );

        const bottomLanguage = useMemo(
          () => chooseLanguage(bottomLanguageSelection, bottomFileMeta?.name, bottomText),
          [bottomLanguageSelection, bottomFileMeta, bottomText],
        );

        const parts = useMemo(
          () => buildParts(topText, bottomText, diffMode, ignoreWhitespace),
          [topText, bottomText, diffMode, ignoreWhitespace],
        );

        const changeStats = useMemo(() => {
          let additions = 0;
          let removals = 0;
          for (const part of parts) {
            if (part.added) additions += partCount(part, diffMode);
            if (part.removed) removals += partCount(part, diffMode);
          }
          return { additions, removals };
        }, [parts, diffMode]);

        const statUnit = diffMode === 'line' ? 'lines' : diffMode === 'char' ? 'chars' : 'tokens';

        useEffect(() => {
          const params = new URLSearchParams();
          if (title.trim()) params.set('title', title.trim());
          if (description.trim()) params.set('description', description.trim());
          if (originalLabel.trim()) params.set('original', originalLabel.trim());
          if (comparisonLabel.trim()) params.set('comparison', comparisonLabel.trim());
          params.set('view', viewMode);
          params.set('mode', diffMode);
          if (ignoreWhitespace) params.set('ws', '1');
          params.set('olang', topLanguageSelection);
          params.set('clang', bottomLanguageSelection);

          const diffPayload = toBase64Url(
            JSON.stringify({
              originalText: topText,
              comparisonText: bottomText,
            }),
          );

          const query = params.toString();
          const nextUrl = `${window.location.pathname}${query ? `?${query}` : ''}#diff=${diffPayload}`;
          window.history.replaceState(null, '', nextUrl);
        }, [
          title,
          description,
          originalLabel,
          comparisonLabel,
          viewMode,
          diffMode,
          ignoreWhitespace,
          topLanguageSelection,
          bottomLanguageSelection,
          topText,
          bottomText,
        ]);

        async function onLoadFile(file, setText, setFileMeta) {
          try {
            const text = await readFileAsText(file);
            setText(text);
            setFileMeta({ name: file.name, size: file.size, source: 'file' });
            setStatusError(false);
            setStatusMessage(`Loaded ${file.name} (${bytesLabel(file.size)}).`);
          } catch (error) {
            setStatusError(true);
            setStatusMessage(`Failed to read ${file.name}: ${error.message}`);
          }
        }

        function clearAll() {
          setTopText('');
          setBottomText('');
          setTopFileMeta(null);
          setBottomFileMeta(null);
          setTopLanguageSelection('auto');
          setBottomLanguageSelection('auto');
          setStatusError(false);
          setStatusMessage('Cleared both inputs.');
        }

        async function copyUrlToClipboard() {
          try {
            await navigator.clipboard.writeText(window.location.href);
            setCopyState('copied');
            window.setTimeout(() => setCopyState('idle'), 1200);
          } catch {
            setCopyState('error');
            window.setTimeout(() => setCopyState('idle'), 1500);
          }
        }

        return h('main', { class: 'shell' }, [
          h('header', { class: 'hero', key: 'hero' }, [
            h('div', { class: 'title-row' }, [
              h(EditableText, {
                value: title || 'Diff',
                onSave: setTitle,
                fallbackValue: 'Diff',
                className: 'title-editable',
                editButtonTitle: 'Edit title',
                element: 'h1',
              }),
            ]),
          ]),
          h('section', { class: 'description-block', key: 'description' }, [
            h('textarea', {
              class: 'description-input',
              value: description,
              placeholder: 'Description...',
              onInput: (event) => setDescription(event.currentTarget.value),
            }),
          ]),
          h('section', { class: 'inputs', key: 'inputs' }, [
            h(InputPane, {
              title: originalLabel || 'Original',
              text: topText,
              setText: setTopText,
              fileMeta: topFileMeta,
              setFileMeta: setTopFileMeta,
              languageSelection: topLanguageSelection,
              setLanguageSelection: setTopLanguageSelection,
              effectiveLanguage: topLanguage,
              onLoadFile,
              isDropTarget: topDropTarget,
              setDropTarget: setTopDropTarget,
              onSaveTitle: (next) => setOriginalLabel(next),
            }),
            h(InputPane, {
              title: comparisonLabel || 'Comparison',
              text: bottomText,
              setText: setBottomText,
              fileMeta: bottomFileMeta,
              setFileMeta: setBottomFileMeta,
              languageSelection: bottomLanguageSelection,
              setLanguageSelection: setBottomLanguageSelection,
              effectiveLanguage: bottomLanguage,
              onLoadFile,
              isDropTarget: bottomDropTarget,
              setDropTarget: setBottomDropTarget,
              onSaveTitle: (next) => setComparisonLabel(next),
            }),
          ]),
          h('div', { class: `status${statusError ? ' error' : ''}`, key: 'status' }, statusMessage),
          h('section', { class: 'diff-zone', key: 'diff' }, [
            h('div', { class: 'diff-surface' }, [
              h('div', { class: 'diff-context' }, [
                h('div', { class: 'diff-context-left' }, [
                  h('span', { class: 'diff-context-title' }, `${diffMode} diff`),
                  h(
                    'span',
                    { class: 'diff-context-stats' },
                    `+${changeStats.additions} / -${changeStats.removals} ${statUnit}`,
                  ),
                ]),
                h('div', { class: 'diff-context-controls' }, [
                  h('div', { class: 'control-toggle', role: 'group', 'aria-label': 'Whitespace' }, [
                    h('label', null, [
                      h('input', {
                        type: 'checkbox',
                        name: 'ignore-whitespace',
                        checked: ignoreWhitespace,
                        onChange: (event) => setIgnoreWhitespace(event.currentTarget.checked),
                      }),
                      h('span', { class: 'control-option' }, 'Ignore WS'),
                    ]),
                  ]),
                  h(
                    'div',
                    { class: 'control-toggle', role: 'radiogroup', 'aria-label': 'Layout' },
                    [
                      h('label', null, [
                        h('input', {
                          type: 'radio',
                          name: 'view-mode',
                          value: 'split',
                          checked: viewMode === 'split',
                          onChange: () => setViewMode('split'),
                        }),
                        h('span', { class: 'control-option' }, 'Split'),
                      ]),
                      h('label', null, [
                        h('input', {
                          type: 'radio',
                          name: 'view-mode',
                          value: 'unified',
                          checked: viewMode === 'unified',
                          onChange: () => setViewMode('unified'),
                        }),
                        h('span', { class: 'control-option' }, 'Unified'),
                      ]),
                    ],
                  ),
                  h(
                    'div',
                    { class: 'control-toggle', role: 'radiogroup', 'aria-label': 'Diff mode' },
                    [
                      h('label', null, [
                        h('input', {
                          type: 'radio',
                          name: 'diff-mode',
                          value: 'word',
                          checked: diffMode === 'word',
                          onChange: () => setDiffMode('word'),
                        }),
                        h('span', { class: 'control-option' }, 'Word'),
                      ]),
                      h('label', null, [
                        h('input', {
                          type: 'radio',
                          name: 'diff-mode',
                          value: 'char',
                          checked: diffMode === 'char',
                          onChange: () => setDiffMode('char'),
                        }),
                        h('span', { class: 'control-option' }, 'Char'),
                      ]),
                      h('label', null, [
                        h('input', {
                          type: 'radio',
                          name: 'diff-mode',
                          value: 'line',
                          checked: diffMode === 'line',
                          onChange: () => setDiffMode('line'),
                        }),
                        h('span', { class: 'control-option' }, 'Line'),
                      ]),
                    ],
                  ),
                  h(
                    'button',
                    {
                      type: 'button',
                      class: 'icon-edit',
                      onClick: copyUrlToClipboard,
                      title:
                        copyState === 'copied'
                          ? 'Copied'
                          : copyState === 'error'
                            ? 'Copy failed'
                            : 'Copy URL',
                      'aria-label': 'Copy URL',
                    },
                    h(CopyIcon),
                  ),
                  h(
                    'button',
                    {
                      type: 'button',
                      class: 'danger',
                      onClick: clearAll,
                    },
                    'Clear',
                  ),
                ]),
              ]),
              viewMode === 'split'
                ? h(SplitDiff, {
                    parts,
                    originalLabel: originalLabel || 'Original',
                    comparisonLabel: comparisonLabel || 'Comparison',
                    onSaveOriginal: (next) => setOriginalLabel(next),
                    onSaveComparison: (next) => setComparisonLabel(next),
                  })
                : h(UnifiedDiff, { parts }),
            ]),
            h('div', { class: 'legend' }, [
              h('span', null, [h('i', { class: 'swatch add' }), ' Added content']),
              h('span', null, [h('i', { class: 'swatch remove' }), ' Removed content']),
              h('span', null, `${originalLabel || 'Original'} syntax: ${topLanguage}`),
              h('span', null, `${comparisonLabel || 'Comparison'} syntax: ${bottomLanguage}`),
            ]),
          ]),
        ]);
      }

      render(h(App), document.getElementById('app'));
    </script>
  </body>
</html>
