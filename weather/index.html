<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Forecast</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --line: #d9e1ef;
        --text: #1b2430;
        --muted: #5d6b82;
        --accent: #0c67d5;
        --accent-hover: #0958b5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at top, #eef4ff 0%, var(--bg) 60%);
        color: var(--text);
        min-height: 100vh;
      }

      .container {
        width: min(1000px, 94vw);
        margin: 2rem auto;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 1.25rem;
        box-shadow: 0 6px 24px rgba(20, 37, 63, 0.08);
      }

      h1 {
        margin: 0;
        font-size: 1.4rem;
      }

      .subtitle {
        margin: 0.35rem 0 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .controls {
        margin-top: 1rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
        align-items: center;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 0.6rem 0.9rem;
        font-size: 0.95rem;
        cursor: pointer;
        background: var(--accent);
        color: #fff;
      }

      button:hover {
        background: var(--accent-hover);
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      input[type='text'] {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 0.6rem 0.75rem;
        font-size: 0.95rem;
        min-width: 280px;
        color: var(--text);
        background: #fff;
      }

      .search-form {
        display: flex;
        gap: 0.55rem;
        flex-wrap: wrap;
        align-items: center;
      }

      .status {
        margin-top: 0.8rem;
        color: var(--muted);
        min-height: 1.3rem;
      }

      .table-wrap {
        margin-top: 1rem;
        overflow-x: auto;
      }

      table {
        border-collapse: collapse;
        width: 100%;
        min-width: 780px;
        font-size: 0.9rem;
      }

      th,
      td {
        border: 1px solid var(--line);
        padding: 0.55rem;
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #eff4fd;
        font-weight: 600;
      }

      .date-main {
        font-weight: 600;
      }

      .date-sub {
        margin-top: 0.15rem;
        font-size: 0.75rem;
        color: var(--muted);
      }

      .badge {
        display: inline-block;
        border-radius: 999px;
        padding: 0.15rem 0.5rem;
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      .temp-normal {
        background: #edf5ff;
        color: #0d4d9f;
      }

      .temp-alert {
        background: #fff1dc;
        color: #8f4c00;
      }

      .wind-normal {
        background: #edf8f3;
        color: #18633f;
      }

      .wind-mid {
        background: #fff6e8;
        color: #8a5a00;
      }

      .wind-alert {
        background: #ffe9ea;
        color: #8c1f27;
      }

      .condition-good {
        color: #1e7a45;
        font-weight: 600;
      }

      .gust-alert {
        background: #ffe1e5;
        color: #7c1220;
      }

      .condition-rain {
        color: #8a5a00;
        font-weight: 600;
      }

      .legend {
        margin-top: 0.75rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
        color: var(--muted);
        font-size: 0.8rem;
      }

      .empty {
        margin-top: 1rem;
        padding: 1rem;
        border: 1px dashed var(--line);
        border-radius: 10px;
        color: var(--muted);
      }

      .attribution {
        margin-top: 1rem;
        color: var(--muted);
        font-size: 0.82rem;
        line-height: 1.4;
      }

      .attribution a {
        color: var(--accent);
      }

      @media (max-width: 760px) {
        .container {
          width: calc(100vw - 1rem);
          margin: 0.5rem auto 1rem;
          border-radius: 10px;
          padding: 0.85rem;
        }

        h1 {
          font-size: 1.2rem;
        }

        .controls {
          align-items: stretch;
          gap: 0.55rem;
        }

        .controls > button {
          width: 100%;
        }

        .search-form {
          width: 100%;
          flex-direction: column;
          align-items: stretch;
        }

        input[type='text'] {
          min-width: 0;
          width: 100%;
        }

        .search-form button {
          width: 100%;
        }

        .table-wrap {
          overflow-x: visible;
        }

        table {
          min-width: 0;
          border-collapse: separate;
          border-spacing: 0;
        }

        thead {
          display: none;
        }

        tbody {
          display: grid;
          gap: 0.75rem;
        }

        tbody tr {
          display: block;
          border: 1px solid var(--line);
          border-radius: 10px;
          background: #fff;
          padding: 0.35rem 0.5rem;
          box-shadow: 0 2px 8px rgba(20, 37, 63, 0.06);
        }

        tbody td {
          display: grid;
          grid-template-columns: minmax(110px, 40%) 1fr;
          gap: 0.45rem;
          align-items: baseline;
          border: 0;
          border-bottom: 1px dashed var(--line);
          padding: 0.45rem 0.25rem;
          font-size: 0.88rem;
        }

        tbody tr td:last-child {
          border-bottom: 0;
        }

        tbody td::before {
          font-size: 0.72rem;
          font-weight: 700;
          color: var(--muted);
          text-transform: uppercase;
          letter-spacing: 0.05em;
        }

        tbody td:nth-child(1)::before {
          content: 'Date';
        }
        tbody td:nth-child(2)::before {
          content: 'High / Low';
        }
        tbody td:nth-child(3)::before {
          content: 'Temp Diff';
        }
        tbody td:nth-child(4)::before {
          content: 'Rain';
        }
        tbody td:nth-child(5)::before {
          content: 'Max Wind';
        }
        tbody td:nth-child(6)::before {
          content: 'Max Gust';
        }
        tbody td:nth-child(7)::before {
          content: 'Condition';
        }
        tbody td:nth-child(8)::before {
          content: 'All Conditions';
        }

        .legend {
          font-size: 0.76rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script type="module">
      import { h, render } from 'https://esm.sh/preact@10.26.6';
      import { useEffect, useMemo, useState } from 'https://esm.sh/preact@10.26.6/hooks';

      const symbolMap = {
        clearsky: 'Clear',
        fair: 'Fair',
        partlycloudy: 'Partly Cloudy',
        cloudy: 'Cloudy',
        rainshowers: 'Rain Showers',
        rainshowersandthunder: 'Thunder Showers',
        sleetshowers: 'Sleet Showers',
        snowshowers: 'Snow Showers',
        rain: 'Rain',
        heavyrain: 'Heavy Rain',
        heavyrainandthunder: 'Heavy Rain & Thunder',
        sleet: 'Sleet',
        snow: 'Snow',
        snowandthunder: 'Snow & Thunder',
        fog: 'Fog',
        sleetshowersandthunder: 'Sleet & Thunder',
        snowshowersandthunder: 'Snow & Thunder',
        rainandthunder: 'Rain & Thunder',
        sleetandthunder: 'Sleet & Thunder',
      };
      const WEATHER_CACHE_PREFIX = 'yr-weather-cache-v1:';
      const WEATHER_STATE_KEY = 'yr-weather-state-v1';

      function interpretSymbolCode(symbolCode) {
        const baseCode = String(symbolCode || '').replace(/_day|_night|_polartwilight/g, '');
        return symbolMap[baseCode] || baseCode || 'Unknown';
      }

      function hasThunder(condition) {
        return condition.toLowerCase().includes('thunder');
      }

      function formatDay(dateStr) {
        return new Date(dateStr + 'T00:00:00Z').toLocaleDateString(undefined, {
          weekday: 'short',
          month: 'short',
          day: 'numeric',
        });
      }

      function getRelativeDayLabel(dateStr) {
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const dayDate = new Date(dateStr + 'T00:00:00');
        const target = new Date(dayDate.getFullYear(), dayDate.getMonth(), dayDate.getDate());
        const msPerDay = 24 * 60 * 60 * 1000;
        const diffDays = Math.round((target.getTime() - today.getTime()) / msPerDay);

        if (diffDays === 0) return 'Today';
        if (diffDays === 1) return 'Tomorrow';
        if (diffDays === -1) return 'Yesterday';
        if (diffDays > 1 && diffDays < 7) {
          return target.toLocaleDateString(undefined, { weekday: 'long' });
        }
        return '';
      }

      function getDateKey(isoTimestamp) {
        return new Date(isoTimestamp).toISOString().split('T')[0];
      }

      function roundCoord(value) {
        return Math.round(value * 10000) / 10000;
      }

      function getCacheKey(lat, lon) {
        return `${WEATHER_CACHE_PREFIX}${lat.toFixed(4)},${lon.toFixed(4)}`;
      }

      function readCache(lat, lon) {
        try {
          const raw = localStorage.getItem(getCacheKey(lat, lon));
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== 'object') return null;
          return parsed;
        } catch {
          return null;
        }
      }

      function writeCache(lat, lon, payload) {
        try {
          localStorage.setItem(getCacheKey(lat, lon), JSON.stringify(payload));
        } catch {}
      }

      function readStateFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const q = (params.get('q') || '').trim();
        const latRaw = params.get('lat');
        const lngRaw = params.get('lng');
        const hasCoords =
          latRaw != null &&
          lngRaw != null &&
          String(latRaw).trim() !== '' &&
          String(lngRaw).trim() !== '';
        const lat = hasCoords ? Number(latRaw) : NaN;
        const lng = hasCoords ? Number(lngRaw) : NaN;
        return {
          q,
          coords: hasCoords && Number.isFinite(lat) && Number.isFinite(lng) ? { lat, lng } : null,
        };
      }

      function readStateFromLocalStorage() {
        try {
          const raw = localStorage.getItem(WEATHER_STATE_KEY);
          if (!raw) return { q: '', coords: null };
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== 'object') return { q: '', coords: null };

          const q = typeof parsed.q === 'string' ? parsed.q.trim() : '';
          const lat = typeof parsed?.coords?.lat === 'number' ? parsed.coords.lat : NaN;
          const lng = typeof parsed?.coords?.lng === 'number' ? parsed.coords.lng : NaN;
          const coords =
            Number.isFinite(lat) && Number.isFinite(lng)
              ? { lat: roundCoord(lat), lng: roundCoord(lng) }
              : null;
          return { q, coords };
        } catch {
          return { q: '', coords: null };
        }
      }

      function writeStateToLocalStorage(state) {
        try {
          localStorage.setItem(WEATHER_STATE_KEY, JSON.stringify(state));
        } catch {}
      }

      function writeCoordsToUrl(lat, lng) {
        const params = new URLSearchParams(window.location.search);
        params.delete('q');
        params.set('lat', String(lat));
        params.set('lng', String(lng));
        const next = `${window.location.pathname}?${params.toString()}${window.location.hash}`;
        window.history.replaceState({}, '', next);
      }

      function writeQueryToUrl(query) {
        const params = new URLSearchParams(window.location.search);
        params.delete('lat');
        params.delete('lng');
        params.set('q', query);
        const next = `${window.location.pathname}?${params.toString()}${window.location.hash}`;
        window.history.replaceState({}, '', next);
      }

      function summarizeForecast(forecast) {
        const dailyData = new Map();

        for (const entry of forecast?.properties?.timeseries || []) {
          const date = getDateKey(entry.time);
          const temp = entry?.data?.instant?.details?.air_temperature;
          const wind = entry?.data?.instant?.details?.wind_speed;
          const gust = entry?.data?.instant?.details?.wind_speed_of_gust;

          if (typeof temp !== 'number' || typeof wind !== 'number') {
            continue;
          }

          if (!dailyData.has(date)) {
            dailyData.set(date, {
              temps: [],
              precipitation: 0,
              windSpeeds: [],
              windGusts: [],
              conditions: new Map(),
            });
          }

          const day = dailyData.get(date);
          day.temps.push(temp);
          day.windSpeeds.push(wind);

          if (typeof gust === 'number') {
            day.windGusts.push(gust);
          }

          day.precipitation +=
            entry?.data?.next_1_hours?.details?.precipitation_amount ??
            entry?.data?.next_6_hours?.details?.precipitation_amount ??
            0;

          const symbolCode =
            entry?.data?.next_12_hours?.summary?.symbol_code ||
            entry?.data?.next_6_hours?.summary?.symbol_code ||
            entry?.data?.next_1_hours?.summary?.symbol_code;

          if (symbolCode) {
            const condition = interpretSymbolCode(symbolCode);
            day.conditions.set(condition, (day.conditions.get(condition) || 0) + 1);
          }
        }

        const summaries = [];

        for (const [date, day] of dailyData.entries()) {
          let dominantCondition = 'Unknown';
          let maxCount = 0;
          const conditionSet = new Set();

          for (const [condition, count] of day.conditions.entries()) {
            conditionSet.add(condition);
            if (count > maxCount) {
              maxCount = count;
              dominantCondition = condition;
            }
          }

          summaries.push({
            date,
            highTemp: Math.max(...day.temps),
            lowTemp: Math.min(...day.temps),
            tempDiff: '',
            totalPrecipitation: Math.round(day.precipitation * 10) / 10,
            maxWindSpeed: Math.round(Math.max(...day.windSpeeds) * 10) / 10,
            maxWindGust:
              day.windGusts.length > 0 ? Math.round(Math.max(...day.windGusts) * 10) / 10 : null,
            conditions: conditionSet,
            dominantCondition,
          });
        }

        summaries.sort((a, b) => a.date.localeCompare(b.date));

        for (let i = 1; i < summaries.length; i += 1) {
          const diff = Math.round(summaries[i].highTemp - summaries[i - 1].highTemp);
          summaries[i].tempDiff = diff > 0 ? `+${diff}` : `${diff}`;
        }

        return summaries;
      }

      function getTempDiffClass(tempDiff) {
        const numeric = Number(String(tempDiff || '').replace('+', ''));
        return Number.isFinite(numeric) && Math.abs(numeric) >= 5 ? 'temp-alert' : 'temp-normal';
      }

      function getWindClass(maxWindSpeed) {
        if (maxWindSpeed < 5) return 'wind-normal';
        if (maxWindSpeed > 8) return 'wind-alert';
        return 'wind-mid';
      }

      function getGustClass(maxWindGust) {
        if (typeof maxWindGust !== 'number') return 'wind-normal';
        if (maxWindGust < 8) return 'wind-normal';
        if (maxWindGust > 15) return 'gust-alert';
        return 'wind-mid';
      }

      function getConditionClass(condition) {
        if (condition.toLowerCase().includes('rain')) return 'condition-rain';
        return condition === 'Clear' || condition === 'Fair' ? 'condition-good' : '';
      }

      async function fetchForecast(lat, lon) {
        const url = `https://api.met.no/weatherapi/locationforecast/2.0/complete?lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lon)}`;
        const response = await fetch(url);

        if (!response.ok) {
          throw new Error(`Forecast request failed: ${response.status} ${response.statusText}`);
        }

        return {
          status: response.status,
          expires: response.headers.get('Expires') || null,
          data: await response.json(),
        };
      }

      async function geocodeLocation(query) {
        const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&q=${encodeURIComponent(query)}`;
        const response = await fetch(url, {
          headers: {
            Accept: 'application/json',
          },
        });

        if (!response.ok) {
          throw new Error(`Location search failed: ${response.status} ${response.statusText}`);
        }

        const results = await response.json();
        if (!Array.isArray(results) || results.length === 0) {
          throw new Error('No matching location found.');
        }

        const first = results[0];
        return {
          lat: Number(first.lat),
          lng: Number(first.lon),
          label: first.display_name || query,
        };
      }

      function App() {
        const [status, setStatus] = useState('Search for a place or click "Use my location".');
        const [forecast, setForecast] = useState(null);
        const [locationLabel, setLocationLabel] = useState('');
        const [searchQuery, setSearchQuery] = useState('');
        const [isLoading, setIsLoading] = useState(false);

        const dailyRows = useMemo(() => summarizeForecast(forecast), [forecast]);

        async function loadForecastFor(lat, lng, label, options = {}) {
          const { urlMode = 'coords', query = '' } = options;
          const roundedLat = roundCoord(lat);
          const roundedLng = roundCoord(lng);
          const now = Date.now();
          const cached = readCache(roundedLat, roundedLng);
          if (
            cached &&
            cached.expiresAt &&
            Number.isFinite(cached.expiresAt) &&
            cached.expiresAt > now &&
            cached.forecast
          ) {
            setForecast(cached.forecast);
            setLocationLabel(label || `${roundedLat.toFixed(4)}, ${roundedLng.toFixed(4)}`);
            if (urlMode === 'coords') {
              writeCoordsToUrl(roundedLat, roundedLng);
              writeStateToLocalStorage({ q: '', coords: { lat: roundedLat, lng: roundedLng } });
            } else {
              writeStateToLocalStorage({ q: query, coords: { lat: roundedLat, lng: roundedLng } });
            }
            setStatus('Forecast loaded from cache.');
            setIsLoading(false);
            return;
          }

          setStatus('Loading forecast...');
          try {
            const response = await fetchForecast(roundedLat, roundedLng);
            const expiresAt = response.expires ? Date.parse(response.expires) : NaN;

            setForecast(response.data);
            setLocationLabel(label || `${roundedLat.toFixed(4)}, ${roundedLng.toFixed(4)}`);

            writeCache(roundedLat, roundedLng, {
              forecast: response.data,
              expiresAt: Number.isFinite(expiresAt) ? expiresAt : now + 30 * 60 * 1000,
            });
            if (urlMode === 'coords') {
              writeCoordsToUrl(roundedLat, roundedLng);
              writeStateToLocalStorage({ q: '', coords: { lat: roundedLat, lng: roundedLng } });
            } else {
              writeStateToLocalStorage({ q: query, coords: { lat: roundedLat, lng: roundedLng } });
            }
            if (response.status === 203) {
              setStatus(
                'Forecast loaded (warning: endpoint is marked deprecated by upstream status 203).',
              );
            } else {
              setStatus('Forecast loaded.');
            }
          } catch (error) {
            setForecast(null);
            const message = error instanceof Error ? error.message : 'Failed to load forecast.';
            setStatus(
              message.includes('429')
                ? `${message}. Throttled by API; please retry later.`
                : message,
            );
          } finally {
            setIsLoading(false);
          }
        }

        useEffect(() => {
          async function loadFromUrlState() {
            const urlState = readStateFromUrl();
            const hasUrlState = Boolean(urlState.q || urlState.coords);
            const state = hasUrlState ? urlState : readStateFromLocalStorage();

            if (state.q) {
              setSearchQuery(state.q);
              setIsLoading(true);
              setStatus('Searching location...');
              try {
                const place = await geocodeLocation(state.q);
                await loadForecastFor(place.lat, place.lng, place.label, {
                  urlMode: 'query',
                  query: state.q,
                });
                writeQueryToUrl(state.q);
              } catch (error) {
                setForecast(null);
                setStatus(error instanceof Error ? error.message : 'Failed to search location.');
                setIsLoading(false);
              }
              return;
            }

            if (state.coords) {
              setIsLoading(true);
              await loadForecastFor(
                state.coords.lat,
                state.coords.lng,
                `${state.coords.lat.toFixed(4)}, ${state.coords.lng.toFixed(4)}`,
                { urlMode: 'coords' },
              );
            }
          }

          void loadFromUrlState();
        }, []);

        async function requestLocationAndLoad() {
          if (!navigator.geolocation) {
            setStatus('Geolocation is not supported in this browser.');
            return;
          }

          setIsLoading(true);
          setStatus('Requesting location permission...');

          navigator.geolocation.getCurrentPosition(
            async (position) => {
              const { latitude, longitude } = position.coords;
              await loadForecastFor(
                latitude,
                longitude,
                `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`,
                {
                  urlMode: 'coords',
                },
              );
            },
            (error) => {
              const message =
                error.code === error.PERMISSION_DENIED
                  ? 'Location permission denied. Enable location and try again.'
                  : error.message || 'Failed to get your location.';
              setStatus(message);
              setIsLoading(false);
            },
            {
              enableHighAccuracy: false,
              timeout: 10000,
            },
          );
        }

        async function searchLocationAndLoad(event) {
          event.preventDefault();
          const query = searchQuery.trim();
          if (!query) {
            setStatus('Enter a location to search.');
            return;
          }

          setIsLoading(true);
          setStatus('Searching location...');
          try {
            const place = await geocodeLocation(query);
            await loadForecastFor(place.lat, place.lng, place.label, { urlMode: 'query', query });
            writeQueryToUrl(query);
          } catch (error) {
            setForecast(null);
            setStatus(error instanceof Error ? error.message : 'Failed to search location.');
            setIsLoading(false);
          }
        }

        return h('div', { class: 'container' }, [
          h('h1', null, 'Local Weather Forecast'),
          h(
            'p',
            { class: 'subtitle' },
            'This app does not assume your location. Search for a place or use geolocation.',
          ),
          h('div', { class: 'controls' }, [
            h(
              'button',
              { onClick: requestLocationAndLoad, disabled: isLoading },
              isLoading ? 'Loading...' : 'Use my location',
            ),
            h('form', { class: 'search-form', onSubmit: searchLocationAndLoad }, [
              h('input', {
                type: 'text',
                value: searchQuery,
                onInput: (event) => setSearchQuery(event.currentTarget.value),
                placeholder: 'Search city, region, country...',
                'aria-label': 'Search location',
                disabled: isLoading,
              }),
              h(
                'button',
                { type: 'submit', disabled: isLoading },
                isLoading ? 'Loading...' : 'Search',
              ),
            ]),
            locationLabel ? h('span', null, `Location: ${locationLabel}`) : null,
          ]),
          h('div', { class: 'status' }, status),
          dailyRows.length
            ? h('div', { class: 'table-wrap' }, [
                h('table', null, [
                  h('thead', null, [
                    h('tr', null, [
                      h('th', null, 'Date'),
                      h('th', null, 'High / Low (°C)'),
                      h('th', null, 'Temp Diff'),
                      h('th', null, 'Rain (mm)'),
                      h('th', null, 'Max Wind (m/s)'),
                      h('th', null, 'Max Gust (m/s)'),
                      h('th', null, 'Conditions'),
                      h('th', null, 'All Conditions'),
                    ]),
                  ]),
                  h(
                    'tbody',
                    null,
                    dailyRows.map((day) => {
                      const allConditions = Array.from(day.conditions);
                      const relativeLabel = getRelativeDayLabel(day.date);
                      const tempClass = getTempDiffClass(day.tempDiff);
                      const windClass = getWindClass(day.maxWindSpeed);
                      const gustClass = getGustClass(day.maxWindGust);
                      return h('tr', { key: day.date }, [
                        h('td', null, [
                          h('div', { class: 'date-main' }, formatDay(day.date)),
                          relativeLabel ? h('div', { class: 'date-sub' }, relativeLabel) : null,
                        ]),
                        h('td', null, `${Math.round(day.highTemp)}° / ${Math.round(day.lowTemp)}°`),
                        h(
                          'td',
                          null,
                          day.tempDiff
                            ? h('span', { class: `badge ${tempClass}` }, day.tempDiff)
                            : '-',
                        ),
                        h('td', null, day.totalPrecipitation || '-'),
                        h('td', null, h('span', { class: `badge ${windClass}` }, day.maxWindSpeed)),
                        h(
                          'td',
                          null,
                          day.maxWindGust != null
                            ? h('span', { class: `badge ${gustClass}` }, day.maxWindGust)
                            : '-',
                        ),
                        h(
                          'td',
                          null,
                          `${day.dominantCondition}${allConditions.some(hasThunder) ? ' ⚡' : ''}`,
                        ),
                        h(
                          'td',
                          null,
                          allConditions.length
                            ? allConditions.map((condition, index) =>
                                h('span', { class: getConditionClass(condition) || null }, [
                                  condition,
                                  index < allConditions.length - 1 ? ', ' : '',
                                ]),
                              )
                            : '-',
                        ),
                      ]);
                    }),
                  ),
                ]),
                h('div', { class: 'legend' }, [
                  h('span', null, 'Temp diff alert: ±5°C or more'),
                  h('span', null, 'Max wind green: < 5 m/s'),
                  h('span', null, 'Max gust green: < 8 m/s'),
                  h('span', null, 'Wind/gust alert: > 8 / > 15 m/s'),
                ]),
              ])
            : h(
                'div',
                { class: 'empty' },
                'No weather loaded yet. Click the location button to fetch forecast data.',
              ),
          h('div', { class: 'attribution' }, [
            'Weather data from ',
            h('a', { href: 'https://www.yr.no/', target: '_blank', rel: 'noreferrer' }, 'Yr'),
            ' / MET Norway. Presented in a modified table format. Licensed under ',
            h(
              'a',
              {
                href: 'https://creativecommons.org/licenses/by/4.0/',
                target: '_blank',
                rel: 'noreferrer',
              },
              'CC BY 4.0',
            ),
            '.',
          ]),
        ]);
      }

      render(h(App), document.getElementById('app'));
    </script>
  </body>
</html>
